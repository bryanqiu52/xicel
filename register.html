<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册 - xicel 全球品牌基建，一站就绪</title>
<script src="js/tailwindcss.js"></script>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/login.css">
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: '#0A66FF',
        'primary-dark': '#0047CC',
        accent: '#00D4AA',
        dark: '#0D1117',
        surface: '#F5F7FA',
        body: '#1E293B',
        muted: '#64748B',
        border: '#E2E8F0'
      }
    }
  }
}
</script>
</head>
<body>

<div id="navbar-container"></div>
<!-- ========== 注册页面主体 ========== -->
<section class="login-page relative overflow-hidden min-h-[calc(100vh-68px)] flex items-center justify-center py-16 px-6">
  <div class="absolute top-0 right-0 w-[600px] h-[600px] rounded-full blur-3xl -translate-y-1/3 translate-x-1/4" style="background:radial-gradient(circle,rgba(10,102,255,0.08),transparent 70%)"></div>
  <div class="absolute bottom-0 left-0 w-[400px] h-[400px] rounded-full blur-3xl -translate-x-1/4 translate-y-1/3" style="background:radial-gradient(circle,rgba(0,212,170,0.06),transparent 70%)"></div>

  <div class="relative z-10 w-full max-w-[460px]">
    <div class="login-card bg-white rounded-2xl shadow-xl border border-border p-8 md:p-10">
      <div class="text-center mb-8">
        <div class="inline-flex items-center gap-2 text-primary text-xs font-semibold mb-4">
          <span class="w-6 h-px bg-primary"></span>
          CREATE ACCOUNT
          <span class="w-6 h-px bg-primary"></span>
        </div>
        <h1 class="text-2xl md:text-3xl font-bold text-body mb-2">创建账户</h1>
        <p class="text-muted text-sm">加入 xicel，开启您的数字化基建之旅</p>
      </div>

      <!-- 步骤指示器 -->
      <div class="flex items-center justify-between mb-8 px-2">
        <div class="step-item flex flex-col items-center">
          <div class="step-circle w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center text-sm font-semibold">1</div>
          <span class="text-xs text-primary mt-1.5 font-medium">基本信息</span>
        </div>
        <div class="flex-1 h-0.5 bg-border mx-2"></div>
        <div class="step-item flex flex-col items-center">
          <div class="step-circle w-8 h-8 rounded-full bg-border text-muted flex items-center justify-center text-sm font-semibold" id="step2Circle">2</div>
          <span class="text-xs text-muted mt-1.5" id="step2Text">邮箱验证</span>
        </div>
        <div class="flex-1 h-0.5 bg-border mx-2"></div>
        <div class="step-item flex flex-col items-center">
          <div class="step-circle w-8 h-8 rounded-full bg-border text-muted flex items-center justify-center text-sm font-semibold" id="step3Circle">3</div>
          <span class="text-xs text-muted mt-1.5" id="step3Text">完成注册</span>
        </div>
      </div>

      <!-- 步骤1：基本信息 -->
      <form id="registerForm" class="space-y-5">
        <div class="form-group">
          <label for="username" class="block text-sm font-semibold text-body mb-2">用户名 <span class="text-red-500">*</span></label>
          <div class="input-wrapper relative">
            <span class="input-icon absolute left-3.5 top-1/2 -translate-y-1/2 text-muted">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input type="text" id="username" name="username" placeholder="请输入用户名（4-20位字符）" 
              class="w-full pl-11 pr-4 py-3.5 border border-border rounded-xl text-sm text-body placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all bg-white">
          </div>
          <p class="error-msg text-xs text-red-500 mt-1.5 hidden" id="usernameError">请输入用户名</p>
        </div>

        <div class="form-group">
          <label for="email" class="block text-sm font-semibold text-body mb-2">邮箱 <span class="text-red-500">*</span></label>
          <div class="input-wrapper relative">
            <span class="input-icon absolute left-3.5 top-1/2 -translate-y-1/2 text-muted">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            </span>
            <input type="email" id="email" name="email" placeholder="请输入邮箱地址" 
              class="w-full pl-11 pr-4 py-3.5 border border-border rounded-xl text-sm text-body placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all bg-white">
          </div>
          <p class="error-msg text-xs text-red-500 mt-1.5 hidden" id="emailError">请输入正确的邮箱地址</p>
        </div>

        <div class="form-group">
          <label for="phone" class="block text-sm font-semibold text-body mb-2">手机号 <span class="text-red-500">*</span></label>
          <div class="input-wrapper relative">
            <span class="input-icon absolute left-3.5 top-1/2 -translate-y-1/2 text-muted">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
            </span>
            <input type="tel" id="phone" name="phone" placeholder="请输入手机号" 
              class="w-full pl-11 pr-4 py-3.5 border border-border rounded-xl text-sm text-body placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all bg-white">
          </div>
          <p class="error-msg text-xs text-red-500 mt-1.5 hidden" id="phoneError">请输入正确的手机号</p>
        </div>

        <div class="form-group">
          <label for="regPassword" class="block text-sm font-semibold text-body mb-2">设置密码 <span class="text-red-500">*</span></label>
          <div class="input-wrapper relative">
            <span class="input-icon absolute left-3.5 top-1/2 -translate-y-1/2 text-muted">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            </span>
            <input type="password" id="regPassword" name="regPassword" placeholder="请输入密码（至少6位，包含字母和数字）" 
              class="w-full pl-11 pr-11 py-3.5 border border-border rounded-xl text-sm text-body placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all bg-white">
            <button type="button" id="toggleRegPassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-muted hover:text-primary transition-colors p-1">
              <svg id="regEyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <p class="error-msg text-xs text-red-500 mt-1.5 hidden" id="regPasswordError">密码长度不能少于6位</p>
          <div class="flex gap-1 mt-2" id="passwordStrength">
            <div class="strength-bar flex-1 h-1 rounded-full bg-border" data-level="1"></div>
            <div class="strength-bar flex-1 h-1 rounded-full bg-border" data-level="2"></div>
            <div class="strength-bar flex-1 h-1 rounded-full bg-border" data-level="3"></div>
          </div>
          <p class="text-xs text-muted mt-1" id="strengthText">密码强度：弱</p>
        </div>

        <div class="form-group">
          <label for="confirmPassword" class="block text-sm font-semibold text-body mb-2">确认密码 <span class="text-red-500">*</span></label>
          <div class="input-wrapper relative">
            <span class="input-icon absolute left-3.5 top-1/2 -translate-y-1/2 text-muted">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            </span>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="请再次输入密码" 
              class="w-full pl-11 pr-11 py-3.5 border border-border rounded-xl text-sm text-body placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all bg-white">
            <button type="button" id="toggleConfirmPassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-muted hover:text-primary transition-colors p-1">
              <svg id="confirmEyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <p class="error-msg text-xs text-red-500 mt-1.5 hidden" id="confirmPasswordError">两次输入的密码不一致</p>
        </div>

        <div class="flex items-start gap-2">
          <input type="checkbox" id="agreeTerms" class="w-4 h-4 mt-0.5 rounded border-border text-primary focus:ring-primary/20 cursor-pointer">
          <label for="agreeTerms" class="text-xs text-muted cursor-pointer leading-relaxed">
            我已阅读并同意
            <a href="#" class="text-primary hover:underline">《用户协议》</a>
            和
            <a href="#" class="text-primary hover:underline">《隐私政策》</a>
          </label>
        </div>
        <p class="error-msg text-xs text-red-500 hidden" id="agreeError">请先同意用户协议和隐私政策</p>

        <button type="submit" id="registerBtn" class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3.5 rounded-xl text-base transition-all shadow-lg shadow-primary/20 hover:shadow-xl hover:shadow-primary/30 hover:-translate-y-0.5 relative overflow-hidden">
          <span class="btn-text">立即注册</span>
          <span class="btn-loading absolute inset-0 flex items-center justify-center hidden">
            <svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
          </span>
          <span class="btn-success absolute inset-0 flex items-center justify-center hidden">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
          </span>
        </button>
      </form>

      <div class="mt-8 text-center">
        <p class="text-sm text-muted">
          已有 xicel 账户？
          <a href="login.html" class="text-primary hover:text-primary-dark font-medium transition-colors">立即登录</a>
        </p>
      </div>
    </div>
  </div>
</section>

<script>
  function setupPasswordToggle(toggleId, inputId, iconId) {
    const toggle = document.getElementById(toggleId);
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    
    if (!toggle || !input || !icon) return;
    
    toggle.addEventListener('click', function() {
      const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
      input.setAttribute('type', type);
      
      if (type === 'text') {
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    });
  }

  setupPasswordToggle('toggleRegPassword', 'regPassword', 'regEyeIcon');
  setupPasswordToggle('toggleConfirmPassword', 'confirmPassword', 'confirmEyeIcon');

  const registerForm = document.getElementById('registerForm');
  const registerBtn = document.getElementById('registerBtn');
  const btnText = registerBtn.querySelector('.btn-text');
  const btnLoading = registerBtn.querySelector('.btn-loading');
  const btnSuccess = registerBtn.querySelector('.btn-success');

  const usernameInput = document.getElementById('username');
  const emailInput = document.getElementById('email');
  const phoneInput = document.getElementById('phone');
  const regPasswordInput = document.getElementById('regPassword');
  const confirmPasswordInput = document.getElementById('confirmPassword');
  const agreeTerms = document.getElementById('agreeTerms');

  const usernameError = document.getElementById('usernameError');
  const emailError = document.getElementById('emailError');
  const phoneError = document.getElementById('phoneError');
  const regPasswordError = document.getElementById('regPasswordError');
  const confirmPasswordError = document.getElementById('confirmPasswordError');
  const agreeError = document.getElementById('agreeError');

  function showError(input, errorEl, message) {
    input.classList.add('border-red-400', 'focus:ring-red-200', 'focus:border-red-400');
    input.classList.remove('border-border', 'focus:ring-primary/20', 'focus:border-primary');
    errorEl.textContent = message;
    errorEl.classList.remove('hidden');
  }

  function hideError(input, errorEl) {
    input.classList.remove('border-red-400', 'focus:ring-red-200', 'focus:border-red-400');
    input.classList.add('border-border', 'focus:ring-primary/20', 'focus:border-primary');
    errorEl.classList.add('hidden');
  }

  usernameInput.addEventListener('input', function() {
    if (this.value.trim().length >= 4) {
      hideError(this, usernameError);
    }
  });

  emailInput.addEventListener('input', function() {
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (emailRegex.test(this.value.trim())) {
      hideError(this, emailError);
    }
  });

  phoneInput.addEventListener('input', function() {
    const phoneRegex = /^1[3-9]\d{9}$/;
    if (phoneRegex.test(this.value.trim())) {
      hideError(this, phoneError);
    }
  });

  function checkPasswordStrength(password) {
    let strength = 0;
    if (password.length >= 6) strength++;
    if (/[a-zA-Z]/.test(password) && /[0-9]/.test(password)) strength++;
    if (/[^a-zA-Z0-9]/.test(password) && password.length >= 8) strength++;
    return strength;
  }

  function updatePasswordStrength() {
    const password = regPasswordInput.value;
    const strength = checkPasswordStrength(password);
    const bars = document.querySelectorAll('.strength-bar');
    const strengthText = document.getElementById('strengthText');
    const colors = ['bg-red-400', 'bg-amber-400', 'bg-green-500'];
    const texts = ['弱', '中', '强'];
    const textColors = ['text-red-500', 'text-amber-500', 'text-green-600'];

    bars.forEach((bar, index) => {
      bar.className = 'strength-bar flex-1 h-1 rounded-full transition-colors';
      if (index < strength) {
        bar.classList.add(colors[strength - 1] || 'bg-border');
      } else {
        bar.classList.add('bg-border');
      }
    });

    if (password.length === 0) {
      strengthText.textContent = '密码强度：弱';
      strengthText.className = 'text-xs text-muted mt-1';
    } else {
      strengthText.textContent = '密码强度：' + (texts[strength - 1] || '弱');
      strengthText.className = 'text-xs mt-1 font-medium ' + (textColors[strength - 1] || 'text-muted');
    }
  }

  regPasswordInput.addEventListener('input', function() {
    updatePasswordStrength();
    if (this.value.length >= 6) {
      hideError(this, regPasswordError);
    }
    if (confirmPasswordInput.value && this.value === confirmPasswordInput.value) {
      hideError(confirmPasswordInput, confirmPasswordError);
    }
  });

  confirmPasswordInput.addEventListener('input', function() {
    if (this.value && this.value === regPasswordInput.value) {
      hideError(this, confirmPasswordError);
    }
  });

  agreeTerms.addEventListener('change', function() {
    if (this.checked) {
      agreeError.classList.add('hidden');
    }
  });

  registerForm.addEventListener('submit', function(e) {
    e.preventDefault();
    
    let isValid = true;
    
    if (!usernameInput.value.trim() || usernameInput.value.trim().length < 4) {
      showError(usernameInput, usernameError, '用户名至少4位字符');
      isValid = false;
    }
    
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(emailInput.value.trim())) {
      showError(emailInput, emailError, '请输入正确的邮箱地址');
      isValid = false;
    }
    
    const phoneRegex = /^1[3-9]\d{9}$/;
    if (!phoneRegex.test(phoneInput.value.trim())) {
      showError(phoneInput, phoneError, '请输入正确的手机号');
      isValid = false;
    }
    
    if (!regPasswordInput.value || regPasswordInput.value.length < 6) {
      showError(regPasswordInput, regPasswordError, '密码长度不能少于6位');
      isValid = false;
    }
    
    if (!confirmPasswordInput.value || confirmPasswordInput.value !== regPasswordInput.value) {
      showError(confirmPasswordInput, confirmPasswordError, '两次输入的密码不一致');
      isValid = false;
    }
    
    if (!agreeTerms.checked) {
      agreeError.classList.remove('hidden');
      isValid = false;
    }
    
    if (!isValid) return;

    btnText.classList.add('opacity-0');
    btnLoading.classList.remove('hidden');
    registerBtn.disabled = true;

    setTimeout(function() {
      btnLoading.classList.add('hidden');
      btnSuccess.classList.remove('hidden');
      registerBtn.classList.remove('bg-primary', 'hover:bg-primary-dark');
      registerBtn.classList.add('bg-accent');

      const step2Circle = document.getElementById('step2Circle');
      const step2Text = document.getElementById('step2Text');
      const step3Circle = document.getElementById('step3Circle');
      const step3Text = document.getElementById('step3Text');
      
      step2Circle.classList.remove('bg-border', 'text-muted');
      step2Circle.classList.add('bg-primary', 'text-white');
      step2Text.classList.remove('text-muted');
      step2Text.classList.add('text-primary', 'font-medium');

      setTimeout(function() {
        step3Circle.classList.remove('bg-border', 'text-muted');
        step3Circle.classList.add('bg-accent', 'text-white');
        step3Text.classList.remove('text-muted');
        step3Text.classList.add('text-accent', 'font-medium');

        setTimeout(function() {
          window.location.href = 'login.html';
        }, 1000);
      }, 800);
    }, 1500);
  });
</script>

<div id="footer-container"></div>
<div id="float-actions-container"></div>

<!-- 咨询弹窗 -->
<div id="consultModal" class="fixed inset-0 z-[9999] flex items-center justify-center p-4" style="display:none;">
  <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeConsultModal()"></div>
  <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden">
    <div class="h-2 bg-gradient-to-r from-primary to-accent"></div>
    <div class="p-8">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-2xl font-bold text-body">立即咨询</h3>
        <button onclick="closeConsultModal()" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-100 transition-colors text-muted hover:text-body">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="w-5 h-5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <form id="consultForm" onsubmit="submitConsult(event)" class="space-y-4">
        <div><label class="block text-sm font-medium text-body mb-1.5">姓名 <span class="text-red-400">*</span></label><input type="text" required placeholder="请输入您的姓名" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all text-sm"></div>
        <div><label class="block text-sm font-medium text-body mb-1.5">电话 <span class="text-red-400">*</span></label><input type="tel" required placeholder="请输入您的手机号" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all text-sm"></div>
        <div><label class="block text-sm font-medium text-body mb-1.5">邮箱</label><input type="email" placeholder="请输入您的邮箱" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all text-sm"></div>
        <div><label class="block text-sm font-medium text-body mb-1.5">需求描述</label><textarea rows="3" placeholder="请简要描述您的需求..." class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all text-sm resize-none"></textarea></div>
        <button type="submit" class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3.5 rounded-xl transition-all shadow-sm shadow-primary/20 hover:shadow-md hover:shadow-primary/30">提交咨询</button>
      </form>
    </div>
  </div>
</div>

<script>
function openConsultModal(){ document.getElementById('consultModal').style.display='flex'; document.body.style.overflow='hidden'; }
function closeConsultModal(){ document.getElementById('consultModal').style.display='none'; document.body.style.overflow=''; }
function submitConsult(e){ e.preventDefault(); alert('感谢您的咨询，我们将尽快联系您！'); closeConsultModal(); }


</script>

<script src="components/navbar.js"></script>
<script src="components/footer.js"></script>
<script src="components/float-actions.js"></script>
</body>
</html>
