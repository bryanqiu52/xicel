          <!-- 搜索输入框 -->
          <input id="trademarkSearchInput" type="text" placeholder="输入商标名称或注册号" class="w-full min-w-0 pl-10 pr-12 border-0 text-sm text-body placeholder-muted focus:outline-none h-12" />
          <!-- 图片上传按钮 -->
          <input type="file" id="imageSearchInput" accept="image/*" class="hidden" onchange="handleImageSearch(this)">
          <button type="button" onclick="document.getElementById('imageSearchInput').click()" class="search-input-image-upload" title="上传图样搜索">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          </button>
        </div>
      </div>
      <!-- 搜索按钮 -->
      <button onclick="handleSearch()" class="flex items-center gap-1 bg-primary hover:bg-primary-dark text-white text-sm font-medium px-5 h-12 rounded-xl transition-colors whitespace-nowrap">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        查询
      </button>
    </div>
  </div>
</section>

<!-- 筛选栏 -->
<section id="searchControls" class="py-5 bg-white border-b border-slate-100">
  <div class="max-w-7xl mx-auto px-6">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
      <div id="resultCount" class="text-sm text-muted">共 0 个结果</div>
      <div class="flex flex-wrap items-center gap-2">
        <span class="text-xs text-muted">状态筛选：</span>
        <button onclick="filterResults('all')" class="trademark-filter-btn active" data-filter="all">全部</button>
        <button onclick="filterResults('registered')" class="trademark-filter-btn" data-filter="registered">已注册</button>
        <button onclick="filterResults('pending')" class="trademark-filter-btn" data-filter="pending">申请中</button>
        <button onclick="filterResults('rejected')" class="trademark-filter-btn" data-filter="rejected">已驳回</button>
        <button onclick="filterResults('invalid')" class="trademark-filter-btn" data-filter="invalid">已无效</button>
      </div>
    </div>
  </div>
</section>

<!-- 搜索结果区 -->
<section id="searchResults" class="py-12 bg-white flex-1">
  <div class="max-w-7xl mx-auto px-6">
    <div id="searchQueryTitle" class="mb-6" style="display:none;">
      <h2 class="text-xl font-bold text-body">

        <span class="text-base text-muted font-normal ml-2">的商标结果</span>
      </h2>
    </div>
    <div id="resultsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
      <!-- 动态渲染卡片 -->
    </div>

    <!-- 无结果空态 -->
    <div id="noResults" class="trademark-empty hidden">
      <div class="trademark-empty-icon">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>

      <p class="text-sm text-muted">试试更换关键词，或上传商标图样进行相似搜索</p>
    </div>
  </div>
</section>

var STATUS_MAP = {
  registered: { text: '已注册', class: 'status-registered' },
  pending: { text: '申请中', class: 'status-pending' },
  rejected: { text: '已驳回', class: 'status-rejected' },
  invalid: { text: '已无效', class: 'status-invalid' }
};

var currentFilter = 'all';
var currentQuery = '';
var isImageSearch = false;

// ===== 工具函数 =====
function getQueryParam(name) {
  var match = new RegExp('[?&]' + name + '=([^&]*)').exec(window.location.search);
  return match ? decodeURIComponent(match[1].replace(/\+/g, ' ')) : '';
}

function generateCoverUrl(prompt) {
  return 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=' + encodeURIComponent(prompt) + '&image_size=landscape_4_3';
}

// ===== 渲染结果 =====
function renderResults(data) {
  var grid = document.getElementById('resultsGrid');
  var countEl = document.getElementById('resultCount');
  var noResults = document.getElementById('noResults');

  if (countEl) countEl.textContent = '共 ' + data.length + ' 个结果';

  if (data.length === 0) {
    grid.innerHTML = '';
    noResults.classList.remove('hidden');
    return;
  }

  noResults.classList.add('hidden');

  grid.innerHTML = data.map(function(item) {
    var status = STATUS_MAP[item.status] || STATUS_MAP.pending;
    var classTags = item.classes.map(function(c) {
      return '<span class="class-tag">第' + c + '类</span>';
    }).join('');

    return '<div class="trademark-card" onclick="openDetailModal(\'' + item.appNo + '\')" style="cursor:pointer;">' +
      '<div class="trademark-cover">' +
        '<img src="' + generateCoverUrl(item.coverPrompt) + '" alt="' + item.name + '" loading="lazy" onerror="this.src=\'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=' + encodeURIComponent('abstract generic trademark placeholder, blue gradient, minimal logo on white background') + '&image_size=landscape_4_3\'" />' +
      '</div>' +
      '<div class="trademark-info">' +
        '<h3 class="trademark-name">' + escapeHtml(item.name) + '</h3>' +
        '<div class="class-tags">' + classTags + '</div>' +
        '<span class="legal-status ' + status.class + '">' + status.text + '</span>' +
        '<div class="trademark-applicant">' +
          '<span class="applicant-icon ' + (item.applicantType === 'company' ? 'icon-company' : 'icon-person') + '"></span>' +
          '<span class="applicant-name">' + escapeHtml(item.applicant) + '</span>' +
        '</div>' +
        '<div class="trademark-meta">' +
          '<span><span class="meta-label">申请号</span>' + escapeHtml(item.appNo) + '</span>' +
          '<span><span class="meta-label">申请年份</span>' + escapeHtml(item.appYear) + '年</span>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}

// ===== 筛选 =====
function filterResults(filter) {
  currentFilter = filter;

  // 更新按钮样式
  document.querySelectorAll('.trademark-filter-btn').forEach(function(btn) {
    if (btn.getAttribute('data-filter') === filter) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  });

  var filtered = TRADEMARK_MOCK_DATA;
  if (filter !== 'all') {
    filtered = TRADEMARK_MOCK_DATA.filter(function(item) {
      return item.status === filter;
    });
  }

  // 如果有文字查询，再按名称过滤（模拟）
  if (currentQuery) {
    filtered = filtered.filter(function(item) {
      return item.name.toLowerCase().indexOf(currentQuery.toLowerCase()) !== -1;
    });
  }

  renderResults(filtered);
}

// ===== 搜索 =====
function handleSearch() {
  var input = document.getElementById('trademarkSearchInput');
  var query = input ? input.value.trim() : '';
  currentQuery = query;

  // 更新 URL，便于刷新和分享
  var url = 'trademark-search.html';
  if (query) {
    url += '?q=' + encodeURIComponent(query);
  }
  if (history.replaceState) {
    history.replaceState(null, '', url);
  }

  updateSearchTitle();
  filterResults(currentFilter);
}

// ===== 图片上传搜索 =====
function handleImageSearch(input) {
  if (input && input.files && input.files.length > 0) {
    // 静态站点不实现真实图像识别，上传后直接跳转结果页
    window.location.href = 'trademark-search.html?mode=image';
  }
}

// ===== 商标详情弹窗 =====
function openDetailModal(appNo) {
  var item = null;
  for (var i = 0; i < TRADEMARK_MOCK_DATA.length; i++) {
    if (TRADEMARK_MOCK_DATA[i].appNo === appNo) {
      item = TRADEMARK_MOCK_DATA[i];
      break;
    }
  }
  if (!item) return;
  renderDetailModal(item);
  var modal = document.getElementById('trademarkDetailModal');
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeDetailModal() {
  var modal = document.getElementById('trademarkDetailModal');
  modal.style.display = 'none';
  document.body.style.overflow = '';
}

function renderDetailModal(item) {
  var status = STATUS_MAP[item.status] || STATUS_MAP.pending;
  var header = document.getElementById('detailHeader');
  var body = document.getElementById('detailBody');
  var scrollEl = document.getElementById('detailScroll');
  if (scrollEl) scrollEl.scrollTop = 0;

  // 头部
  var headerHTML = '';
  headerHTML += '<div class="detail-header-top">';
  headerHTML += '<div><h2 class="detail-trademark-name">' + escapeHtml(item.name) + '</h2></div>';
  headerHTML += '<span class="detail-status-badge ' + item.status + '">' + status.text + '</span>';
  headerHTML += '</div>';

  // 分类标签
  var classTags = item.classes.map(function(c) {
    return '<span class="detail-intl-class">第' + c + '类</span>';
  }).join('');

  headerHTML += '<div class="detail-header-tags">';
  headerHTML += classTags;
  headerHTML += '<span class="detail-app-no">申请号 ' + escapeHtml(item.appNo) + '</span>';
  headerHTML += '</div>';
  header.innerHTML = headerHTML;

  // 信息区
  var bodyHTML = '';

  // 商标图样
  bodyHTML += '<div class="detail-section">';
  bodyHTML += '<div class="detail-section-title">商标图样</div>';
  bodyHTML += '<div class="detail-image-wrap">';
  bodyHTML += '<img src="' + generateCoverUrl(item.coverPrompt) + '" alt="' + escapeHtml(item.name) + '" class="detail-image" onerror="this.src=\'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=' + encodeURIComponent('abstract generic trademark placeholder, blue gradient, minimal logo on white background') + '&image_size=landscape_4_3\'" />';
  bodyHTML += '</div></div>';

  // 申请人信息
  bodyHTML += '<div class="detail-section">';
  bodyHTML += '<div class="detail-section-title">申请人信息</div>';
  bodyHTML += '<div class="detail-info-grid">';
  bodyHTML += '<div class="detail-info-item"><span class="detail-info-label">申请人名称</span><span class="detail-info-value">' + escapeHtml(item.applicant) + '</span></div>';
  bodyHTML += '<div class="detail-info-item full-width"><span class="detail-info-label">申请人地址</span><span class="detail-info-value">' + escapeHtml(item.applicantAddress || '—') + '</span></div>';
  bodyHTML += '<div class="detail-info-item full-width"><span class="detail-info-label">代理机构</span><span class="detail-info-value">' + escapeHtml(item.agent || '—') + '</span></div>';
  bodyHTML += '</div></div>';

  // 商品服务列表
  if (item.goodsServices && item.goodsServices.length > 0) {
    bodyHTML += '<div class="detail-section">';
    bodyHTML += '<div class="detail-section-title">商品服务列表</div>';
    for (var g = 0; g < item.goodsServices.length; g++) {
      var gs = item.goodsServices[g];
      bodyHTML += '<div class="detail-goods-group">';
      bodyHTML += '<div class="detail-goods-group-header">' + escapeHtml(gs.group) + '</div>';
      bodyHTML += '<div class="detail-goods-list">';
      for (var t = 0; t < gs.items.length; t++) {
        bodyHTML += '<span class="detail-goods-tag">' + escapeHtml(gs.items[t]) + '</span>';
      }
      bodyHTML += '</div></div>';
    }
    bodyHTML += '</div>';
  }

  // 法律节点
  bodyHTML += '<div class="detail-section">';
  bodyHTML += '<div class="detail-section-title">关键日期</div>';
  bodyHTML += '<div class="detail-info-grid">';
  bodyHTML += '<div class="detail-info-item"><span class="detail-info-label">申请日期</span><span class="detail-info-value">' + escapeHtml(item.applicationDate || '—') + '</span></div>';
  bodyHTML += '<div class="detail-info-item"><span class="detail-info-label">初审公告日</span><span class="detail-info-value">' + escapeHtml(item.initialReviewDate || '—') + '</span></div>';
  bodyHTML += '<div class="detail-info-item"><span class="detail-info-label">注册公告日</span><span class="detail-info-value">' + escapeHtml(item.registrationDate || '—') + '</span></div>';
  bodyHTML += '<div class="detail-info-item"><span class="detail-info-label">专用权期限起始日</span><span class="detail-info-value">' + escapeHtml(item.durationStart || '—') + '</span></div>';
  bodyHTML += '</div></div>';

  // 状态流程时间轴
  if (item.statusFlows && item.statusFlows.length > 0) {
    bodyHTML += '<div class="detail-section">';
    bodyHTML += '<div class="detail-section-title">状态流程</div>';
    bodyHTML += '<div class="detail-timeline">';
    for (var f = 0; f < item.statusFlows.length; f++) {
      var flow = item.statusFlows[f];
      var isLatest = (f === 0);
      bodyHTML += '<div class="detail-timeline-item' + (isLatest ? ' latest' : '') + '">';
      bodyHTML += '<div class="timeline-event">' + escapeHtml(flow.event) + '</div>';
      bodyHTML += '<div class="timeline-date">' + escapeHtml(flow.date) + '</div>';
      bodyHTML += '</div>';
    }
    bodyHTML += '</div></div>';
  }

  // 商标公告
  if (item.announcements && item.announcements.length > 0) {
    bodyHTML += '<div class="detail-section">';
    bodyHTML += '<div class="detail-section-title">商标公告</div>';
    for (var a = 0; a < item.announcements.length; a++) {
      var ann = item.announcements[a];
      bodyHTML += '<div class="detail-announcement-item">';
      bodyHTML += '<div class="detail-announcement-icon"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg></div>';
      bodyHTML += '<div class="detail-announcement-info">';
      bodyHTML += '<div class="detail-announcement-title">' + escapeHtml(ann.title) + '</div>';
      bodyHTML += '<div class="detail-announcement-meta">' + escapeHtml(ann.date) + ' · ' + escapeHtml(ann.issueNo) + '</div>';
      bodyHTML += '</div>';
      bodyHTML += '<span class="detail-announcement-page">' + escapeHtml(ann.page) + '</span>';
      bodyHTML += '</div>';
    }
    bodyHTML += '</div>';
  }

  // 底部操作
  bodyHTML += '<div class="detail-actions">';
  bodyHTML += '<button class="detail-btn-primary" onclick="alert(\'已添加监测\')"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>监测该商标</button>';
  bodyHTML += '<button class="detail-btn-secondary" onclick="alert(\'已复制分享链接\')"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>分享</button>';
  bodyHTML += '</div>';

  body.innerHTML = bodyHTML;
}

// 更新标题
function updateSearchTitle() {
  var title = document.getElementById('searchQueryTitle');
  var display = document.getElementById('searchQueryDisplay');
  if (currentQuery) {
    display.textContent = '"' + currentQuery + '"';
    title.style.display = '';
  } else if (isImageSearch) {
    display.textContent = '图样';
    title.style.display = '';
  } else {
    title.style.display = 'none';
  }
}

// ===== 初始化 =====
(function init() {
  currentQuery = getQueryParam('q');
  isImageSearch = getQueryParam('mode') === 'image';

  var input = document.getElementById('trademarkSearchInput');
  if (input && currentQuery) {
    input.value = currentQuery;
  }

  updateSearchTitle();
  filterResults('all');

  // 绑定回车搜索
  if (input) {
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        handleSearch();
      }
    });
  }
})();
</script>
