<script>

var newsData = [
  { id: 1, title: "xicel 全球节点扩展至30+国家，亚太区延迟降低40%", summary: "xicel正式宣布全球骨干网络扩展至30+国家和地区，亚太地区用户平均访问延迟降低40%，为企业出海提供更优质的网络基础设施。", date: "2026-07-05", category: "company", categoryLabel: "公司动态", img: "https://images.unsplash.com/photo-1558494949-ef010cbdcc31?w=600&h=400&fit=crop", reads: 12860, content: "<p>xicel正式宣布全球骨干网络扩展至30+国家和地区，亚太地区用户平均访问延迟降低40%，为企业出海提供更优质的网络基础设施。</p><p>本次扩展覆盖了东南亚、中东、欧洲及南美地区的新设节点。其中东南亚新增新加坡、雅加达、曼谷三个Tier3级节点，中东新增迪拜节点，欧洲新增法兰克福和米兰节点。这些节点均采用BGP智能路由与SD-WAN技术，可自动选择最优网络路径。</p><p>据测试数据，新加坡至中国大陆的延迟从此前的85ms降至48ms，迪拜至深圳的延迟降至112ms，法兰克福至广州的延迟降至158ms。新的骨干网架构还支持Anycast DNS，确保域名解析速度提升60%以上。</p><div class='bg-slate-100 rounded-xl h-64 flex items-center justify-center text-[#94A3B8] text-sm my-6'>全球节点分布示意图</div><p>「我们持续投资全球网络基础设施，」xicel CTO Alex Chen表示，「无论是跨境电商、出海游戏还是全球化SaaS企业，都能在新架构下获得更快的加载速度和更稳定的网络体验。」</p><p>新节点现已全面开放，所有客户自动受益，无需额外配置。企业客户还可通过控制台查看实时延迟地图和流量分布热力图。</p>" },
  { id: 2, title: "2026全球出海域名保护趋势报告：.ai域名增长320%", summary: "xicel研究院发布《2026全球域名保护趋势报告》，数据显示.ai域名注册量同比增长320%，成为增速最快的顶级域名，反映了AI行业的爆发式增长。", date: "2026-07-02", category: "industry", categoryLabel: "行业资讯", img: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=600&h=400&fit=crop", reads: 9850, content: "<p>xicel研究院发布《2026全球域名保护趋势报告》，数据显示.ai域名注册量同比增长320%，成为增速最快的顶级域名，反映了AI行业的爆发式增长。</p><p>报告基于全球300万+域名注册数据分析，主要发现包括：① .ai域名从2025年的12万注册量飙升至2026年中的50万+，增长320%；② .io域名增长放缓至15%；③ 传统.com仍占绝对优势（42%市场份额），但份额同比下降3个百分点；④ 中国企业域名争议案件同比增长28%，品牌域名保护意识显著增强。</p><div class='bg-slate-100 rounded-xl h-64 flex items-center justify-center text-[#94A3B8] text-sm my-6'>域名增长趋势图表</div><p>值得注意的是，73%的.ai域名注册来自AI创业公司和科技巨头。Google、Meta、Microsoft等公司均在今年上半年批量注册了大量.ai域名作为品牌保护策略。中国企业方面，字节跳动、百度、商汤科技等也加大了对.ai域名的持有量。</p><p>xicel域名业务负责人建议企业应建立\"品牌域名矩阵\"，至少覆盖.com/.cn/.ai/.io四个核心后缀，并结合商标注册构建完整的品牌护城河。</p>" },
  { id: 3, title: "xicel SSL证书产品线升级：支持90天自动化部署与OCSP装订", summary: "SSL证书产品线重大升级，新增自动化部署工具，支持ACME协议一键签发，兼容Nginx/Apache/Caddy等主流Web服务器，证书部署效率提升80%。", date: "2026-06-28", category: "product", categoryLabel: "产品发布", img: "https://images.unsplash.com/photo-1614064641938-3bbee52942c7?w=600&h=400&fit=crop", reads: 7450, content: "<p>SSL证书产品线重大升级，新增自动化部署工具，支持ACME协议一键签发，兼容Nginx/Apache/Caddy等主流Web服务器，证书部署效率提升80%。</p><p>本次升级的核心功能包括：</p><p><strong>1. 90天自动化部署</strong>：基于ACME v2协议，用户只需在控制台申请证书并下载一个配置文件，系统会自动完成验证、签发、部署和定时续期。支持通配符证书和SAN多域名证书。</p><p><strong>2. OCSP装订</strong>：新增OCSP Stapling支持，可大幅减少SSL握手时间（平均减少30%），同时提升用户隐私保护，避免CA服务器追踪访问行为。</p><div class='bg-slate-100 rounded-xl h-48 flex items-center justify-center text-[#94A3B8] text-sm my-6'>自动化部署流程图</div><p><strong>3. 多服务器同步</strong>：一个证书可同步部署至最多10台服务器，适用于负载均衡和CDN边缘节点场景。</p><p>新功能即日起对所有SSL证书用户免费开放。管理员可在xicel控制台 → 安全 → SSL证书 → 自动化部署中开启。</p>" },
  { id: 4, title: "SD-WAN智能路由技术详解：如何将跨境网络成本降低40%", summary: "深入解析xicel SD-WAN智能路由核心技术——动态路径选择、前向纠错与流量压缩三大技术如何协同工作，帮助出海企业大幅降低跨境网络成本。", date: "2026-06-20", category: "tech", categoryLabel: "技术分享", img: "https://images.unsplash.com/photo-1544197150-b99a580bb7a8?w=600&h=400&fit=crop", reads: 6320, content: "<p>深入解析xicel SD-WAN智能路由核心技术——动态路径选择、前向纠错与流量压缩三大技术如何协同工作，帮助出海企业大幅降低跨境网络成本。</p><p><strong>一、动态路径选择（DPS）</strong></p><p>传统BGP路由依赖固定路径表，一旦某条链路出现拥塞，数据包只能排队等待。xicel的DPS引擎每秒采集全球200+节点的延迟、丢包率和可用带宽数据，通过加权最短路径算法实时计算最优路由。实测数据显示，DPS可将跨境链路的平均RTT降低35%，峰值时段可降低60%以上。</p><p><strong>二、前向纠错（FEC）</strong></p><p>在丢包率超过0.5%的链路上，TCP重传会导致带宽利用率骤降。xicel的FEC机制在发送端额外注入10%~15%的冗余校验包，接收端可自行恢复丢失数据包而无需等待重传。在3%丢包率的恶劣网络环境下，有效吞吐量可提升200%。</p><div class='bg-slate-100 rounded-xl h-48 flex items-center justify-center text-[#94A3B8] text-sm my-6'>FEC工作原理示意图</div><p><strong>三、智能流量压缩</strong></p><p>针对HTTP/HTTPS、数据库查询等可压缩流量，xicel在CPE端进行实时LZ4/Zstd压缩。典型的企业应用流量可压缩至原始的30%~50%，直接节省带宽成本。</p><p>三项技术的联合应用，使xicel某跨境电商客户实现了月均网络成本从$12,000降至$7,200，降幅40%。</p>" },
  { id: 5, title: "xicel推出企业品牌保护一站式方案：域名+商标+监控全覆盖", summary: "全新企业品牌保护方案正式上线，整合域名注册/监控、商标注册/续展、品牌侵权监测三大模块，帮助企业构建完整的品牌数字护城河。", date: "2026-06-15", category: "product", categoryLabel: "产品发布", img: "https://images.unsplash.com/photo-1560472354-b33ff0c44a43?w=600&h=400&fit=crop", reads: 5280, content: "<p>全新企业品牌保护方案正式上线，整合域名注册/监控、商标注册/续展、品牌侵权监测三大模块，帮助企业构建完整的品牌数字护城河。</p><p>方案核心能力：</p><p><strong>域名矩阵管理</strong>：自动推荐与品牌相关的高价值域名（如品牌名+行业关键词），支持跨后缀批量注册和管理。内置WHOIS变更监控，当竞争对手尝试注册相似域名时主动告警。</p><p><strong>商标智能注册</strong>：基于AI的商标分类推荐引擎，根据企业经营范围自动匹配尼斯分类。支持全球100+国家/地区的商标注册与续展提醒。</p><div class='bg-slate-100 rounded-xl h-48 flex items-center justify-center text-[#94A3B8] text-sm my-6'>品牌保护方案架构图</div><p><strong>侵权监测</strong>：7×24小时监控全球电商平台（Amazon、eBay、Shopee等）、社交媒体、App Store中的品牌侵权线索。发现疑似侵权行为后30分钟内通过短信、邮件和站内信三重通知。</p><p>定价方面，基础版¥2,999/年（覆盖域名监控+1个商标类别），专业版¥8,999/年（覆盖全球监控+3个商标类别+律师函服务），企业版定制报价。</p>" },
  { id: 6, title: "从零到一：域名转入xicel完整指南，5步完成迁移", summary: "本文详细讲解域名从其他注册商转入xicel的完整流程，包括解锁域名、获取转移码、发起转入、DNS无缝切换和验证确认，全程零宕机。", date: "2026-06-08", category: "tech", categoryLabel: "技术分享", img: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=600&h=400&fit=crop", reads: 4120, content: "<p>本文详细讲解域名从其他注册商转入xicel的完整流程，包括解锁域名、获取转移码、发起转入、DNS无缝切换和验证确认，全程零宕机。</p><p><strong>第一步：准备工作（5分钟）</strong></p><p>登录当前域名注册商后台，确认以下三点：① 域名注册满60天（ICANN规定新注册域名60天内不可转移）；② 域名处于 unlocked 状态；③ WHOIS隐私保护已关闭或邮箱可正常接收邮件。同时确保域名的管理员邮箱是您可访问的——转移确认邮件将发送至此邮箱。</p><p><strong>第二步：获取转移码/EPP Code（5分钟）</strong></p><p>在注册商后台找到「获取转移码」或「Request Auth Code」功能。Godaddy在「域名设置→转移域名」中，Namecheap在「Domain→Manage→Sharing & Transfer」中。转移码通常为6-16位的字母数字组合，有效期5-15天。收到后请复制保存。</p><div class='bg-slate-100 rounded-xl h-48 flex items-center justify-center text-[#94A3B8] text-sm my-6'>获取转移码截图示意</div><p><strong>第三步：在xicel发起转入（3分钟）</strong></p><p>登录xicel控制台 → 域名 → 域名转入，输入域名和转移码，选择续费年限（转入通常要求续费1年），提交订单并完成支付。</p><p><strong>第四步：确认转移（等待1-5天）</strong></p><p>提交后，ICANN会向域名管理员邮箱发送确认邮件。点击邮件中的确认链接。大多数后缀（.com/.net/.org等）转移耗时1-5个工作日；.cn域名转移较快，通常24小时内完成。</p><p><strong>第五步：DNS无缝切换</strong></p><p>转移完成前，建议先在xicel预先配置好DNS解析记录（A记录、CNAME、MX等），确保转移完成瞬间DNS即生效，实现零宕机迁移。</p>" },
  { id: 7, title: "xicel云服务器全新升级：搭载第四代EPYC处理器，性能提升60%", summary: "xicel云服务器产品线全面升级，搭载AMD第四代EPYC处理器，整机计算性能提升60%，内存带宽提升75%，同时价格保持不变。", date: "2026-06-01", category: "product", categoryLabel: "产品发布", img: "https://images.unsplash.com/photo-1558494949-ef010cbdcc31?w=600&h=400&fit=crop", reads: 8900, content: "<p>xicel云服务器产品线全面升级，搭载AMD第四代EPYC处理器，整机计算性能提升60%，内存带宽提升75%，同时价格保持不变。</p><p>本次升级涉及通用型、计算型、内存型三大产品系列，核心变化包括：</p><p><strong>处理器升级</strong>：从EPYC 7003系列升级至9004系列，单CPU核心数最高96核，L3缓存提升至384MB，主频提升至3.7GHz。SPECcpu2017基准测试成绩提升58%。</p><p><strong>内存升级</strong>：全面支持DDR5-4800内存，带宽从3200MT/s提升至4800MT/s，延迟降低18%。支持ECC自动纠错，保障数据完整性。</p><div class='bg-slate-100 rounded-xl h-48 flex items-center justify-center text-[#94A3B8] text-sm my-6'>性能对比图表</div><p><strong>存储升级</strong>：系统盘默认NVMe SSD，随机读写IOPS提升至100万+，顺序读取速度达7GB/s。支持存储快照和加密功能。</p><p>所有新老用户均可享受升级，已有实例将在维护窗口期自动迁移，无需用户操作。</p>" },
  { id: 8, title: "2026上半年中国云计算市场报告：出海需求驱动行业增长25%", summary: "IDC发布2026上半年中国云计算市场报告，xicel在出海云服务领域市场份额排名前三，跨境网络和海外节点成为关键竞争力。", date: "2026-05-25", category: "industry", categoryLabel: "行业资讯", img: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=600&h=400&fit=crop", reads: 11200, content: "<p>IDC发布2026上半年中国云计算市场报告，xicel在出海云服务领域市场份额排名前三，跨境网络和海外节点成为关键竞争力。</p><p>报告显示，2026年上半年中国云计算市场规模达到2850亿元，同比增长25%。其中出海云服务增速最快，同比增长42%，成为行业增长的核心驱动力。</p><p>主要发现：</p><p>① 跨境电商、游戏出海和SaaS全球化是三大需求来源，合计占出海云服务市场的68%</p><p>② 东南亚是最热门的出海目的地，占出海需求的45%，其次为中东（18%）和欧洲（15%）</p><div class='bg-slate-100 rounded-xl h-48 flex items-center justify-center text-[#94A3B8] text-sm my-6'>市场份额分布图</div><p>③ 跨境网络质量（延迟、稳定性）超越价格，成为企业选择云服务商的首要因素</p><p>xicel凭借全球30+节点和SD-WAN智能路由技术，在出海云服务满意度调研中获评4.8/5分（满分5分）。</p>" },
  { id: 9, title: "xicel获ISO 27001和SOC 2双重认证，安全合规体系再升级", summary: "xicel正式通过ISO 27001信息安全管理体系认证和SOC 2 Type II审计，标志其安全合规能力达到国际一流水平。", date: "2026-05-18", category: "company", categoryLabel: "公司动态", img: "https://images.unsplash.com/photo-1560472354-b33ff0c44a43?w=600&h=400&fit=crop", reads: 6750, content: "<p>xicel正式通过ISO 27001信息安全管理体系认证和SOC 2 Type II审计，标志其安全合规能力达到国际一流水平。</p><p>ISO 27001是国际标准化组织（ISO）发布的信息安全管理体系标准，覆盖14个控制域、114项控制措施。xicel通过了包括信息安全策略、组织安全、资产管理、访问控制、加密、物理安全等全部控制域的审核。</p><p>SOC 2 Type II由AICPA（美国注册会计师协会）认证的审计机构出具，重点关注安全性、可用性、处理完整性和保密性四大原则。本次审计覆盖了xicel的核心云服务平台、域名注册系统和SSL证书管理系统，审计周期为12个月。</p><div class='bg-slate-100 rounded-xl h-48 flex items-center justify-center text-[#94A3B8] text-sm my-6'>认证证书展示</div><p>「这两项认证是xicel对客户安全承诺的重要体现，」xicel安全负责人表示，「我们将持续投入安全建设，计划在2026年底前完成ISO 27018（云隐私保护）和PCI DSS（支付卡安全）认证。」</p><p>企业客户可在xicel控制台 → 合规中心下载认证报告，用于自身合规审计和客户尽调。</p>" },
  { id: 10, title: "Anycast DNS技术揭秘：如何实现全球域名解析延迟低于20ms", summary: "本文深入讲解xicel Anycast DNS的技术原理，通过BGP Anycast+EDNS Client Subnet实现全球用户域名解析延迟低于20ms的工程实践。", date: "2026-05-10", category: "tech", categoryLabel: "技术分享", img: "https://images.unsplash.com/photo-1544197150-b99a580bb7a8?w=600&h=400&fit=crop", reads: 5400, content: "<p>本文深入讲解xicel Anycast DNS的技术原理，通过BGP Anycast+EDNS Client Subnet实现全球用户域名解析延迟低于20ms的工程实践。</p><p><strong>一、传统DNS的瓶颈</strong></p><p>传统Unicast DNS将解析请求路由到固定服务器，全球用户可能被解析到远端节点。例如中国用户解析到美国DNS服务器，单次查询延迟可达200ms+，影响页面首屏加载速度。</p><p><strong>二、Anycast DNS原理</strong></p><p>xicel在全球部署了18个DNS解析节点，每个节点对外宣告相同的Anycast IP地址。BGP协议会自动将用户请求路由到拓扑距离最近的节点。</p><div class='bg-slate-100 rounded-xl h-48 flex items-center justify-center text-[#94A3B8] text-sm my-6'>Anycast路由示意图</div><p><strong>三、EDNS Client Subnet优化</strong></p><p>xicel DNS支持EDNS Client Subnet（ECS）协议，会将用户网段信息传递给权威DNS，使CDN和GSLB能返回距离用户最近的边缘节点IP，进一步降低应用层延迟。</p><p>实测数据：全球95%用户的DNS解析延迟低于20ms，P99延迟低于50ms。对比传统DNS方案，页面首屏加载时间平均缩短1.2秒。</p>" },
  { id: 11, title: "xicel控制台3.0发布：全新UI设计与智能运维助手", summary: "xicel控制台3.0正式发布，采用全新UI设计语言，新增AI智能运维助手、一键诊断和可视化拓扑等功能，管理效率提升3倍。", date: "2026-05-02", category: "product", categoryLabel: "产品发布", img: "https://images.unsplash.com/photo-1614064641938-3bbee52942c7?w=600&h=400&fit=crop", reads: 9600, content: "<p>xicel控制台3.0正式发布，采用全新UI设计语言，新增AI智能运维助手、一键诊断和可视化拓扑等功能，管理效率提升3倍。</p><p><strong>全新UI设计</strong></p><p>3.0版本采用卡片式布局和深色/浅色双主题，信息密度提升40%的同时视觉更清爽。导航从顶部菜单改为左侧侧边栏，支持快捷搜索和书签功能。</p><p><strong>AI智能运维助手</strong></p><p>内置AI助手支持自然语言交互，可直接输入「查看本月费用」「重启服务器」「检查SSL证书到期情况」等指令，系统自动解析并执行。同时支持异常自动告警和根因分析建议。</p><div class='bg-slate-100 rounded-xl h-48 flex items-center justify-center text-[#94A3B8] text-sm my-6'>控制台3.0界面预览</div><p><strong>一键诊断</strong></p><p>新增全链路诊断工具，可一键检测DNS解析、网络连通性、SSL证书、端口开放状态等12项指标，30秒内生成诊断报告。</p><p><strong>可视化拓扑</strong></p><p>自动绘制云资源拓扑图，直观展示VPC、子网、安全组、实例之间的网络关系，支持点击钻取查看详情。</p>" },
  { id: 12, title: "全球数据中心绿色能源报告：xicel可再生能源使用率达75%", summary: "xicel发布2026绿色能源报告，全球数据中心可再生能源使用率达75%，PUE降至1.18，承诺2030年实现碳中和运营。", date: "2026-04-22", category: "company", categoryLabel: "公司动态", img: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=600&h=400&fit=crop", reads: 7200, content: "<p>xicel发布2026绿色能源报告，全球数据中心可再生能源使用率达75%，PUE降至1.18，承诺2030年实现碳中和运营。</p><p>报告要点：</p><p>① 全球18个数据中心中，13个已采用风电、光伏或水电等可再生能源供电，占比75%</p><p>② 整体PUE（电能利用效率）从2025年的1.25降至1.18，优于行业平均1.55</p><p>③ 通过液冷技术替代传统风冷，单机柜功率密度从15kW提升至40kW，冷却能耗降低60%</p><div class='bg-slate-100 rounded-xl h-48 flex items-center justify-center text-[#94A3B8] text-sm my-6'>绿色能源使用趋势图</div><p>④ 余热回收系统在法兰克福和北京节点试点，为周边社区供暖</p><p>xicel ESG负责人表示：「我们将在2027年前将可再生能源使用率提升至90%，并在2030年实现全面碳中和运营。同时我们要求供应链合作伙伴在2028年前制定明确的减碳计划。」</p><p>完整ESG报告可在xicel官网下载，企业客户采购时可索取绿色数据中心专属报价方案。</p>" },
  { id: 13, title: "云服务器安全加固指南：从网络到系统的6层防护体系", summary: "本文系统讲解云服务器安全加固的最佳实践，覆盖网络层、主机层、应用层、数据层、身份层和审计层6层防护体系。", date: "2026-04-15", category: "tech", categoryLabel: "技术分享", img: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=600&h=400&fit=crop", reads: 8300, content: "<p>本文系统讲解云服务器安全加固的最佳实践，覆盖网络层、主机层、应用层、数据层、身份层和审计层6层防护体系。</p><p><strong>第一层：网络防护</strong></p><p>配置安全组仅开放必要端口（如Web服务器仅开放80/443），使用VPC隔离内网资源，启用DDoS高防清洗。建议设置IP白名单限制SSH/RDP访问，并使用VPN或堡垒机跳转。</p><p><strong>第二层：主机加固</strong></p><p>及时安装系统补丁，禁用不必要的服务和端口，配置fail2ban防止暴力破解。建议使用xicel主机安全扫描功能定期检测漏洞。</p><div class='bg-slate-100 rounded-xl h-48 flex items-center justify-center text-[#94A3B8] text-sm my-6'>6层防护体系架构图</div><p><strong>第三层：应用安全</strong></p><p>部署WAF防火墙防护SQL注入、XSS等Web攻击，启用HTTPS并配置HSTS。定期进行应用层渗透测试和代码审计。</p><p><strong>第四层：数据安全</strong></p><p>对敏感数据进行加密存储（AES-256），数据库启用TDE透明数据加密。定期备份并验证恢复流程，建议3-2-1备份策略。</p><p><strong>第五层：身份认证</strong></p><p>强制启用MFA多因素认证，使用IAM最小权限原则分配角色。API密钥定期轮换，废弃密钥及时删除。</p><p><strong>第六层：审计监控</strong></p><p>开启操作审计日志（Action Trail），配置异常行为告警规则。建议接入SIEM系统进行集中安全分析和威胁狩猎。</p>" },
  { id: 14, title: "xicel与全球顶级CDN厂商达成战略合作，边缘节点扩展至200+", summary: "xicel与多家全球顶级CDN厂商达成战略合作，边缘节点扩展至200+，覆盖6大洲，用户静态资源加速效果提升300%。", date: "2026-04-08", category: "company", categoryLabel: "公司动态", img: "https://images.unsplash.com/photo-1558494949-ef010cbdcc31?w=600&h=400&fit=crop", reads: 6800, content: "<p>xicel与多家全球顶级CDN厂商达成战略合作，边缘节点扩展至200+，覆盖6大洲，用户静态资源加速效果提升300%。</p><p>本次合作整合了多家CDN合作伙伴的边缘节点资源，xicel CDN产品节点总数从80个扩展至200+，覆盖范围包括：</p><p>亚太：65个节点（中国大陆35个、东南亚15个、日韩10个、澳新5个）</p><p>欧洲：55个节点（西欧30个、东欧15个、北欧10个）</p><p>北美：50个节点（美东20个、美西20个、加拿大10个）</p><div class='bg-slate-100 rounded-xl h-48 flex items-center justify-center text-[#94A3B8] text-sm my-6'>全球节点分布图</div><p>中东：15个节点、南美：10个节点、非洲：5个节点</p><p>通过智能DNS调度和多CDN冗余机制，xicel CDN可实现：① 全球95%用户边缘节点延迟低于30ms；② 单节点故障自动切换，可用性99.99%；③ 动态加速支持WebSocket和HTTP/3协议。</p><p>CDN加速服务已全量上线，用户可在控制台 → 网络与CDN中配置。新用户可享受3个月免费试用。</p>" },
  { id: 15, title: "2026年SSL证书行业变革：Google推动90天证书有效期落地", summary: "Google宣布从2026年起逐步将SSL证书最长有效期缩短至90天，本文分析这一变革对企业的影响及xicel的应对方案。", date: "2026-03-28", category: "industry", categoryLabel: "行业资讯", img: "https://images.unsplash.com/photo-1560472354-b33ff0c44a43?w=600&h=400&fit=crop", reads: 9100, content: "<p>Google宣布从2026年起逐步将SSL证书最长有效期缩短至90天，本文分析这一变革对企业的影响及xicel的应对方案。</p><p>2026年2月，Chrome浏览器官方博客发布声明，计划在2026-2027年间将SSL/TLS证书的最大有效期从目前的398天逐步缩短至90天。这意味着企业需要每年更换4次证书，而非目前的1次。</p><p><strong>变革原因</strong></p><p>缩短证书有效期可降低密钥泄露风险窗口期，提升PKI生态整体安全性。同时推动行业向自动化证书管理方向发展。</p><p><strong>对企业的影响</strong></p><p>① 手动更换证书的工作量增加4倍，运维成本显著上升</p><p>② 证书到期未及时更换导致网站无法访问的风险增加</p><div class='bg-slate-100 rounded-xl h-48 flex items-center justify-center text-[#94A3B8] text-sm my-6'>证书有效期变化时间线</div><p>③ 跨部门协调（IT、采购、安全）频率增加</p><p><strong>xicel应对方案</strong></p><p>xicel SSL证书产品已全面支持ACME v2自动化协议，可自动完成证书申请、验证、部署和续期全流程。90天证书方案无需人工干预，系统会在到期前15天自动申请新证书并热部署，实现零宕机切换。</p><p>此外，xicel提供证书到期监控和告警服务，支持短信、邮件、站内信三重通知，确保证书永不过期。</p>" },
  { id: 16, title: "xicel对象存储OSS上线：兼容S3协议，支持跨区域复制与生命周期管理", summary: "xicel对象存储OSS正式上线，完全兼容S3协议，支持跨区域复制、生命周期管理、版本控制和加密存储，起价¥0.099/GB/月。", date: "2026-03-20", category: "product", categoryLabel: "产品发布", img: "https://images.unsplash.com/photo-1614064641938-3bbee52942c7?w=600&h=400&fit=crop", reads: 7700, content: "<p>xicel对象存储OSS正式上线，完全兼容S3协议，支持跨区域复制、生命周期管理、版本控制和加密存储，起价¥0.099/GB/月。</p><p><strong>核心特性</strong></p><p>① S3协议兼容：支持S3 API全套接口，现有AWS S3应用可零代码迁移</p><p>② 跨区域复制：数据可自动同步至全球任意xicel区域，支持一对多复制</p><p>③ 生命周期管理：可设置自动转储规则（标准→低频→归档）和过期删除</p><div class='bg-slate-100 rounded-xl h-48 flex items-center justify-center text-[#94A3B8] text-sm my-6'>OSS存储层级图</div><p>④ 版本控制：保留对象所有历史版本，支持误删恢复</p><p>⑤ 加密存储：支持SSE-S3、SSE-KMS和客户端加密三种模式</p><p><strong>存储层级与定价</strong></p><p>标准存储：¥0.099/GB/月，适合频繁访问的热数据</p><p>低频访问：¥0.06/GB/月，适合月访问1-2次的温数据</p><p>归档存储：¥0.015/GB/月，适合合规存档的冷数据，解冻时间1-5分钟</p><p>OSS已在全球18个区域开放，用户可在控制台 → 存储与CDN中创建Bucket开始使用。</p>" },
  { id: 17, title: "跨境网络优化实战：BGP优化与CN2 GIA线路对比测试", summary: "本文通过实测数据对比BGP优化线路与CN2 GIA线路在中国大陆至海外节点的延迟、丢包率和稳定性表现。", date: "2026-03-12", category: "tech", categoryLabel: "技术分享", img: "https://images.unsplash.com/photo-1544197150-b99a580bb7a8?w=600&h=400&fit=crop", reads: 6100, content: "<p>本文通过实测数据对比BGP优化线路与CN2 GIA线路在中国大陆至海外节点的延迟、丢包率和稳定性表现。</p><p><strong>测试背景</strong></p><p>测试从北京、上海、广州三地分别通过163骨干网、CN2 GIA线路和BGP优化线路连接至xicel香港、新加坡、美西节点，持续7天，每天24小时采样。</p><p><strong>测试结果：延迟对比（平均值）</strong></p><p>香港节点：163线路 65ms / CN2 GIA 38ms / BGP优化 32ms</p><p>新加坡节点：163线路 145ms / CN2 GIA 58ms / BGP优化 48ms</p><div class='bg-slate-100 rounded-xl h-48 flex items-center justify-center text-[#94A3B8] text-sm my-6'>线路延迟对比图表</div><p>美西节点：163线路 210ms / CN2 GIA 150ms / BGP优化 135ms</p><p><strong>丢包率对比（晚高峰20:00-23:00）</strong></p><p>163线路：2.8%-5.2% / CN2 GIA：0.1%-0.3% / BGP优化：0.05%-0.15%</p><p><strong>结论</strong></p><p>1. CN2 GIA线路明显优于普通163骨干网，延迟降低40%-60%，丢包率降低90%+</p><p>2. xicel BGP优化线路在CN2 GIA基础上进一步优化，通过多线路智能调度实现更低的延迟和丢包率</p><p>3. 建议对延迟敏感的业务（如实时通信、在线游戏）优先选择BGP优化或CN2 GIA线路</p>" },
  { id: 18, title: "xicel成为2026杭州亚运会数字基础设施服务商", summary: "xicel正式成为2026年杭州亚运会数字基础设施服务商，为赛事官网、票务系统和直播平台提供云计算与CDN服务。", date: "2026-03-01", category: "company", categoryLabel: "公司动态", img: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=600&h=400&fit=crop", reads: 15600, content: "<p>xicel正式成为2026年杭州亚运会数字基础设施服务商，为赛事官网、票务系统和直播平台提供云计算与CDN服务。</p><p>作为亚运会数字基础设施服务商，xicel将提供以下核心服务：</p><p>① 云服务器与弹性伸缩：保障赛事期间官网和票务系统在流量高峰期（如开闭幕式、热门赛事售票）的稳定运行，支持秒级扩容应对10倍突发流量</p><p>② 全球CDN加速：为全球观众提供低延迟的赛事官网和直播页面访问体验，覆盖200+边缘节点</p><div class='bg-slate-100 rounded-xl h-48 flex items-center justify-center text-[#94A3B8] text-sm my-6'>亚运会数字基础设施架构图</div><p>③ 网络安全防护：部署DDoS高防（T级清洗能力）和WAF防火墙，保障赛事系统免受网络攻击</p><p>④ 数据库与大数据：为赛事数据分析、实时成绩展示和观众画像提供高性能数据库支持</p><p>xicel将组建专项保障团队，7×24小时值守，确保赛事期间所有数字系统零故障运行。这是xicel继2025年全运会后再次服务大型国际体育赛事。</p>" }

// ===== 渲染 =====
var currentPage = 1;
var pageSize = 6;
var currentCategory = 'all';
var searchKeyword = '';

function getCategoryColor(cat) {
  var map = { company: 'text-primary bg-[#EFF6FF]', industry: 'text-accent bg-[#E6FFFA]', product: 'text-purple-500 bg-purple-50', tech: 'text-amber-600 bg-amber-50' };
  return map[cat] || 'text-[#64748B] bg-slate-100';
}

function getCategoryImgBg(cat) {
  var map = { company: 'from-primary/10 to-primary/5', industry: 'from-accent/10 to-accent/5', product: 'from-purple-50 to-purple-100', tech: 'from-amber-50 to-amber-100' };
  return map[cat] || 'from-slate-50 to-slate-100';
}

function renderNewsCard(n) {
  return '<a href="news-detail.html?id='+n.id+'" class="group block bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 border border-[#E2E8F0]">'+
    '<div class="aspect-video overflow-hidden"><img src="'+n.img+'" alt="" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" loading="lazy" /></div>'+
    '<div class="p-5">'+
      '<span class="inline-block text-xs font-medium px-2.5 py-1 rounded-full '+getCategoryColor(n.category)+' mb-3">'+n.categoryLabel+'</span>'+
      '<h3 class="font-semibold text-[#1E293B] group-hover:text-primary transition-colors mb-2 line-clamp-2" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">'+n.title+'</h3>'+
      '<p class="text-xs text-[#64748B] mb-4 line-clamp-2" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">'+n.summary+'</p>'+
      '<div class="flex items-center justify-between text-xs">'+
        '<span class="text-[#94A3B8]">'+n.date+'</span>'+
        '<span class="text-primary font-medium group-hover:translate-x-0.5 transition-transform inline-flex items-center gap-1">阅读更多 <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></span>'+
      '</div>'+
    '</div>'+
  '</a>';
}

// 分页器渲染 - 与 user.html 样式一致
function renderPagination(total, totalPages) {
  var prevDisabled = currentPage <= 1;
  var nextDisabled = currentPage >= totalPages;
  var html = '<div class="table-footer-left">'+
    '<span>共 <strong style="color:#0A66FF;">'+total+'</strong> 条记录</span>'+
    (totalPages > 1 ? '<span style="margin-left:8px;">第 '+currentPage+' / '+totalPages+' 页</span>' : '')+
    '</div>';
  html += '<div class="table-footer-right"><div class="pagination">';
  // 上一页
  html += '<button class="page-btn '+(prevDisabled?'disabled':'')+'" id="prevPage" title="上一页" '+(prevDisabled?'disabled':'')+'>'+
    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>';
  // 页码按钮（智能显示，最多5个）
  var maxVisible = 5;
  var startPage = 1, endPage = totalPages;
  if (totalPages > maxVisible) {
    if (currentPage <= 3) { startPage = 1; endPage = maxVisible; }
    else if (currentPage >= totalPages - 2) { startPage = totalPages - maxVisible + 1; endPage = totalPages; }
    else { startPage = currentPage - 2; endPage = currentPage + 2; }
  }
  if (startPage > 1) {
    html += '<button class="page-btn" data-page="1">1</button>';
    if (startPage > 2) html += '<button class="page-btn disabled">...</button>';
  }
  for (var i = startPage; i <= endPage; i++) {
    html += '<button class="page-btn '+(i===currentPage?'active':'')+'" data-page="'+i+'">'+i+'</button>';
  }
  if (endPage < totalPages) {
    if (endPage < totalPages - 1) html += '<button class="page-btn disabled">...</button>';
    html += '<button class="page-btn" data-page="'+totalPages+'">'+totalPages+'</button>';
  }
  // 下一页
  html += '<button class="page-btn '+(nextDisabled?'disabled':'')+'" id="nextPage" title="下一页" '+(nextDisabled?'disabled':'')+'>'+
    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>';
  html += '</div></div>';
  return html;
}

// 搜索处理
function handleNewsSearch() {
  var input = document.getElementById('newsSearchInput');
  searchKeyword = input.value.trim().toLowerCase();
  currentPage = 1;
  renderNews();
}

function resetNewsSearch() {
  document.getElementById('newsSearchInput').value = '';
  searchKeyword = '';
  currentCategory = 'all';
  currentPage = 1;
  // 重置分类按钮状态
  document.querySelectorAll('#categoryFilters .filter-btn').forEach(function(b){
    b.classList.remove('bg-primary','text-white','shadow-sm');
    b.classList.add('bg-white','text-[#64748B]','border','border-[#E2E8F0]');
  });
  var allBtn = document.querySelector('#categoryFilters .filter-btn[data-category="all"]');
  if (allBtn) { allBtn.classList.add('bg-primary','text-white','shadow-sm'); allBtn.classList.remove('bg-white','text-[#64748B]','border','border-[#E2E8F0]'); }
  renderNews();
}

function getFilteredNews() {
  var filtered = currentCategory === 'all' ? newsData.slice() : newsData.filter(function(n){ return n.category === currentCategory; });
  if (searchKeyword) {
    filtered = filtered.filter(function(n){
      return n.title.toLowerCase().indexOf(searchKeyword) >= 0 || n.summary.toLowerCase().indexOf(searchKeyword) >= 0;
    });
  }
  return filtered;
}

function renderNews() {
  var filtered = getFilteredNews();
  var totalPages = Math.ceil(filtered.length / pageSize);
  if (totalPages === 0) totalPages = 1;
  if (currentPage > totalPages) currentPage = totalPages;
  var start = (currentPage - 1) * pageSize;
  var pageItems = filtered.slice(start, start + pageSize);

  if (filtered.length === 0) {
    document.getElementById('newsGrid').innerHTML = '<div class="col-span-full text-center py-20 text-[#94A3B8]"><svg class="w-16 h-16 mx-auto mb-4 text-slate-300" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><p class="text-sm">未找到匹配的新闻，试试其他关键词吧</p></div>';
  } else {
    document.getElementById('newsGrid').innerHTML = pageItems.map(renderNewsCard).join('');
  }
  document.getElementById('pagination').innerHTML = renderPagination(filtered.length, totalPages);

  // 绑定分页事件
  document.querySelectorAll('#pagination button[data-page]').forEach(function(btn){
    btn.addEventListener('click', function(){
      currentPage = parseInt(this.dataset.page);
      renderNews();
      window.scrollTo({ top: document.getElementById('newsGrid').offsetTop - 120, behavior: 'smooth' });
    });
  });
  var prevBtn = document.getElementById('prevPage');
  var nextBtn = document.getElementById('nextPage');
  if (prevBtn) prevBtn.addEventListener('click', function(){ if (currentPage>1){ currentPage--; renderNews(); window.scrollTo({ top: document.getElementById('newsGrid').offsetTop - 120, behavior: 'smooth' }); } });
  if (nextBtn) nextBtn.addEventListener('click', function(){ if (currentPage<totalPages){ currentPage++; renderNews(); window.scrollTo({ top: document.getElementById('newsGrid').offsetTop - 120, behavior: 'smooth' }); } });
}

// 分类筛选
document.querySelectorAll('#categoryFilters .filter-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    document.querySelectorAll('#categoryFilters .filter-btn').forEach(function(b){
      b.classList.remove('bg-primary','text-white','shadow-sm');
      b.classList.add('bg-white','text-[#64748B]','border','border-[#E2E8F0]');
    });
    btn.classList.add('bg-primary','text-white','shadow-sm');
    btn.classList.remove('bg-white','text-[#64748B]','border','border-[#E2E8F0]');
    currentCategory = btn.dataset.category;
    currentPage = 1;
    renderNews();
  });
});

// 初始化
renderNews();
</script>

</div>
