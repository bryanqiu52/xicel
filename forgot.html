<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>忘记密码 - xicel 全球品牌基建，一站就绪</title>
<script src="js/tailwindcss.js"></script>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/login.css">
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: '#0A66FF',
        'primary-dark': '#0047CC',
        accent: '#00D4AA',
        dark: '#0D1117',
        surface: '#F5F7FA',
        body: '#1E293B',
        muted: '#64748B',
        border: '#E2E8F0'
      }
    }
  }
}
</script>
</head>
<body>

<div id="navbar-container"></div>
<!-- ========== 忘记密码页面主体 ========== -->
<section class="login-page relative overflow-hidden min-h-[calc(100vh-68px)] flex items-center justify-center py-16 px-6">
  <div class="absolute top-0 right-0 w-[600px] h-[600px] rounded-full blur-3xl -translate-y-1/3 translate-x-1/4" style="background:radial-gradient(circle,rgba(10,102,255,0.08),transparent 70%)"></div>
  <div class="absolute bottom-0 left-0 w-[400px] h-[400px] rounded-full blur-3xl -translate-x-1/4 translate-y-1/3" style="background:radial-gradient(circle,rgba(0,212,170,0.06),transparent 70%)"></div>

  <div class="relative z-10 w-full max-w-[460px]">
    <div class="login-card bg-white rounded-2xl shadow-xl border border-border p-8 md:p-10">
      <div class="text-center mb-8">
        <div class="inline-flex items-center gap-2 text-primary text-xs font-semibold mb-4">
          <span class="w-6 h-px bg-primary"></span>
          FORGOT PASSWORD
          <span class="w-6 h-px bg-primary"></span>
        </div>
        <h1 class="text-2xl md:text-3xl font-bold text-body mb-2">找回密码</h1>
        <p class="text-muted text-sm">通过邮箱验证重置您的账户密码</p>
      </div>

      <!-- 步骤指示器 -->
      <div class="flex items-center justify-between mb-8 px-2">
        <div class="step-item flex flex-col items-center">
          <div class="step-circle w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center text-sm font-semibold" id="step1Circle">1</div>
          <span class="text-xs text-primary mt-1.5 font-medium" id="step1Text">验证邮箱</span>
        </div>
        <div class="flex-1 h-0.5 bg-border mx-2" id="line1"></div>
        <div class="step-item flex flex-col items-center">
          <div class="step-circle w-8 h-8 rounded-full bg-border text-muted flex items-center justify-center text-sm font-semibold" id="step2Circle">2</div>
          <span class="text-xs text-muted mt-1.5" id="step2Text">重置密码</span>
        </div>
        <div class="flex-1 h-0.5 bg-border mx-2" id="line2"></div>
        <div class="step-item flex flex-col items-center">
          <div class="step-circle w-8 h-8 rounded-full bg-border text-muted flex items-center justify-center text-sm font-semibold" id="step3Circle">3</div>
          <span class="text-xs text-muted mt-1.5" id="step3Text">完成</span>
        </div>
      </div>

      <!-- 步骤1：验证邮箱 -->
      <form id="forgotStep1" class="space-y-5">
        <div class="form-group">
          <label for="forgotEmail" class="block text-sm font-semibold text-body mb-2">注册邮箱 <span class="text-red-500">*</span></label>
          <div class="input-wrapper relative">
            <span class="input-icon absolute left-3.5 top-1/2 -translate-y-1/2 text-muted">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            </span>
            <input type="email" id="forgotEmail" name="forgotEmail" placeholder="请输入您注册时使用的邮箱" 
              class="w-full pl-11 pr-4 py-3.5 border border-border rounded-xl text-sm text-body placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all bg-white">
          </div>
          <p class="error-msg text-xs text-red-500 mt-1.5 hidden" id="forgotEmailError">请输入正确的邮箱地址</p>
        </div>

        <div class="form-group">
          <label for="verifyCode" class="block text-sm font-semibold text-body mb-2">验证码 <span class="text-red-500">*</span></label>
          <div class="flex gap-3">
            <div class="input-wrapper relative flex-1">
              <span class="input-icon absolute left-3.5 top-1/2 -translate-y-1/2 text-muted">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
              </span>
              <input type="text" id="verifyCode" name="verifyCode" placeholder="请输入验证码" maxlength="6"
                class="w-full pl-11 pr-4 py-3.5 border border-border rounded-xl text-sm text-body placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all bg-white">
            </div>
            <button type="button" id="sendCodeBtn" class="px-5 py-3.5 bg-primary/10 text-primary hover:bg-primary/20 text-sm font-medium rounded-xl transition-colors whitespace-nowrap min-w-[120px]">
              获取验证码
            </button>
          </div>
          <p class="error-msg text-xs text-red-500 mt-1.5 hidden" id="verifyCodeError">请输入验证码</p>
        </div>

        <button type="submit" id="step1Btn" class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3.5 rounded-xl text-base transition-all shadow-lg shadow-primary/20 hover:shadow-xl hover:shadow-primary/30 hover:-translate-y-0.5 relative overflow-hidden">
          <span class="btn-text">下一步</span>
          <span class="btn-loading absolute inset-0 flex items-center justify-center hidden">
            <svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
          </span>
        </button>
      </form>

      <!-- 步骤2：重置密码 -->
      <form id="forgotStep2" class="space-y-5 hidden">
        <div class="form-group">
          <label for="newPassword" class="block text-sm font-semibold text-body mb-2">新密码 <span class="text-red-500">*</span></label>
          <div class="input-wrapper relative">
            <span class="input-icon absolute left-3.5 top-1/2 -translate-y-1/2 text-muted">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            </span>
            <input type="password" id="newPassword" name="newPassword" placeholder="请输入新密码（至少6位）" 
              class="w-full pl-11 pr-11 py-3.5 border border-border rounded-xl text-sm text-body placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all bg-white">
            <button type="button" id="toggleNewPassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-muted hover:text-primary transition-colors p-1">
              <svg id="newEyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <p class="error-msg text-xs text-red-500 mt-1.5 hidden" id="newPasswordError">密码长度不能少于6位</p>
          <div class="flex gap-1 mt-2" id="forgotPasswordStrength">
            <div class="strength-bar flex-1 h-1 rounded-full bg-border" data-level="1"></div>
            <div class="strength-bar flex-1 h-1 rounded-full bg-border" data-level="2"></div>
            <div class="strength-bar flex-1 h-1 rounded-full bg-border" data-level="3"></div>
          </div>
          <p class="text-xs text-muted mt-1" id="forgotStrengthText">密码强度：弱</p>
        </div>

        <div class="form-group">
          <label for="confirmNewPassword" class="block text-sm font-semibold text-body mb-2">确认新密码 <span class="text-red-500">*</span></label>
          <div class="input-wrapper relative">
            <span class="input-icon absolute left-3.5 top-1/2 -translate-y-1/2 text-muted">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            </span>
            <input type="password" id="confirmNewPassword" name="confirmNewPassword" placeholder="请再次输入新密码" 
              class="w-full pl-11 pr-11 py-3.5 border border-border rounded-xl text-sm text-body placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all bg-white">
            <button type="button" id="toggleConfirmNewPassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-muted hover:text-primary transition-colors p-1">
              <svg id="confirmNewEyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <p class="error-msg text-xs text-red-500 mt-1.5 hidden" id="confirmNewPasswordError">两次输入的密码不一致</p>
        </div>

        <button type="submit" id="step2Btn" class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3.5 rounded-xl text-base transition-all shadow-lg shadow-primary/20 hover:shadow-xl hover:shadow-primary/30 hover:-translate-y-0.5 relative overflow-hidden">
          <span class="btn-text">确认重置</span>
          <span class="btn-loading absolute inset-0 flex items-center justify-center hidden">
            <svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
          </span>
          <span class="btn-success absolute inset-0 flex items-center justify-center hidden">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
          </span>
        </button>
      </form>

      <!-- 步骤3：完成 -->
      <div id="forgotStep3" class="text-center py-6 hidden">
        <div class="w-20 h-20 mx-auto mb-6 bg-accent/10 rounded-full flex items-center justify-center">
          <svg class="w-10 h-10 text-accent" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <h3 class="text-xl font-bold text-body mb-2">密码重置成功！</h3>
        <p class="text-muted text-sm mb-8">您的密码已成功重置，请使用新密码登录</p>
        <a href="login.html" class="inline-flex items-center justify-center w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3.5 rounded-xl text-base transition-all shadow-lg shadow-primary/20 hover:shadow-xl hover:shadow-primary/30 hover:-translate-y-0.5">
          立即登录
        </a>
      </div>

      <div class="mt-8 text-center">
        <p class="text-sm text-muted">
          想起密码了？
          <a href="login.html" class="text-primary hover:text-primary-dark font-medium transition-colors">返回登录</a>
        </p>
      </div>
    </div>
  </div>
</section>

<script>
  function setupPasswordToggle(toggleId, inputId, iconId) {
    const toggle = document.getElementById(toggleId);
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    
    if (!toggle || !input || !icon) return;
    
    toggle.addEventListener('click', function() {
      const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
      input.setAttribute('type', type);
      
      if (type === 'text') {
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    });
  }

  setupPasswordToggle('toggleNewPassword', 'newPassword', 'newEyeIcon');
  setupPasswordToggle('toggleConfirmNewPassword', 'confirmNewPassword', 'confirmNewEyeIcon');

  const sendCodeBtn = document.getElementById('sendCodeBtn');
  const forgotEmailInput = document.getElementById('forgotEmail');
  const forgotEmailError = document.getElementById('forgotEmailError');
  const verifyCodeInput = document.getElementById('verifyCode');
  const verifyCodeError = document.getElementById('verifyCodeError');
  const forgotStep1 = document.getElementById('forgotStep1');
  const forgotStep2 = document.getElementById('forgotStep2');
  const forgotStep3 = document.getElementById('forgotStep3');
  const step1Btn = document.getElementById('step1Btn');
  const step2Btn = document.getElementById('step2Btn');

  const newPasswordInput = document.getElementById('newPassword');
  const confirmNewPasswordInput = document.getElementById('confirmNewPassword');
  const newPasswordError = document.getElementById('newPasswordError');
  const confirmNewPasswordError = document.getElementById('confirmNewPasswordError');

  let countdown = 0;
  let countdownTimer = null;

  function showError(input, errorEl, message) {
    input.classList.add('border-red-400', 'focus:ring-red-200', 'focus:border-red-400');
    input.classList.remove('border-border', 'focus:ring-primary/20', 'focus:border-primary');
    errorEl.textContent = message;
    errorEl.classList.remove('hidden');
  }

  function hideError(input, errorEl) {
    input.classList.remove('border-red-400', 'focus:ring-red-200', 'focus:border-red-400');
    input.classList.add('border-border', 'focus:ring-primary/20', 'focus:border-primary');
    errorEl.classList.add('hidden');
  }

  forgotEmailInput.addEventListener('input', function() {
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (emailRegex.test(this.value.trim())) {
      hideError(this, forgotEmailError);
    }
  });

  verifyCodeInput.addEventListener('input', function() {
    if (this.value.trim().length >= 4) {
      hideError(this, verifyCodeError);
    }
  });

  sendCodeBtn.addEventListener('click', function() {
    if (countdown > 0) return;
    
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(forgotEmailInput.value.trim())) {
      showError(forgotEmailInput, forgotEmailError, '请输入正确的邮箱地址');
      return;
    }

    countdown = 60;
    sendCodeBtn.disabled = true;
    sendCodeBtn.classList.add('bg-slate-100', 'text-muted', 'cursor-not-allowed');
    sendCodeBtn.classList.remove('bg-primary/10', 'text-primary', 'hover:bg-primary/20');
    
    updateCountdown();
    countdownTimer = setInterval(updateCountdown, 1000);
  });

  function updateCountdown() {
    if (countdown > 0) {
      sendCodeBtn.textContent = countdown + 's 后重发';
      countdown--;
    } else {
      clearInterval(countdownTimer);
      sendCodeBtn.textContent = '重新发送';
      sendCodeBtn.disabled = false;
      sendCodeBtn.classList.remove('bg-slate-100', 'text-muted', 'cursor-not-allowed');
      sendCodeBtn.classList.add('bg-primary/10', 'text-primary', 'hover:bg-primary/20');
    }
  }

  forgotStep1.addEventListener('submit', function(e) {
    e.preventDefault();
    
    let isValid = true;
    
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(forgotEmailInput.value.trim())) {
      showError(forgotEmailInput, forgotEmailError, '请输入正确的邮箱地址');
      isValid = false;
    }
    
    if (!verifyCodeInput.value.trim() || verifyCodeInput.value.trim().length < 4) {
      showError(verifyCodeInput, verifyCodeError, '请输入验证码');
      isValid = false;
    }
    
    if (!isValid) return;

    const btnText = step1Btn.querySelector('.btn-text');
    const btnLoading = step1Btn.querySelector('.btn-loading');
    
    btnText.classList.add('opacity-0');
    btnLoading.classList.remove('hidden');
    step1Btn.disabled = true;

    setTimeout(function() {
      forgotStep1.classList.add('hidden');
      forgotStep2.classList.remove('hidden');
      
      const step2Circle = document.getElementById('step2Circle');
      const step2Text = document.getElementById('step2Text');
      const line1 = document.getElementById('line1');
      
      step2Circle.classList.remove('bg-border', 'text-muted');
      step2Circle.classList.add('bg-primary', 'text-white');
      step2Text.classList.remove('text-muted');
      step2Text.classList.add('text-primary', 'font-medium');
      line1.classList.remove('bg-border');
      line1.classList.add('bg-primary');
    }, 1000);
  });

  function checkPasswordStrength(password) {
    let strength = 0;
    if (password.length >= 6) strength++;
    if (/[a-zA-Z]/.test(password) && /[0-9]/.test(password)) strength++;
    if (/[^a-zA-Z0-9]/.test(password) && password.length >= 8) strength++;
    return strength;
  }

  function updateForgotPasswordStrength() {
    const password = newPasswordInput.value;
    const strength = checkPasswordStrength(password);
    const bars = document.querySelectorAll('#forgotPasswordStrength .strength-bar');
    const strengthText = document.getElementById('forgotStrengthText');
    const colors = ['bg-red-400', 'bg-amber-400', 'bg-green-500'];
    const texts = ['弱', '中', '强'];
    const textColors = ['text-red-500', 'text-amber-500', 'text-green-600'];

    bars.forEach((bar, index) => {
      bar.className = 'strength-bar flex-1 h-1 rounded-full transition-colors';
      if (index < strength) {
        bar.classList.add(colors[strength - 1] || 'bg-border');
      } else {
        bar.classList.add('bg-border');
      }
    });

    if (password.length === 0) {
      strengthText.textContent = '密码强度：弱';
      strengthText.className = 'text-xs text-muted mt-1';
    } else {
      strengthText.textContent = '密码强度：' + (texts[strength - 1] || '弱');
      strengthText.className = 'text-xs mt-1 font-medium ' + (textColors[strength - 1] || 'text-muted');
    }
  }

  newPasswordInput.addEventListener('input', function() {
    updateForgotPasswordStrength();
    if (this.value.length >= 6) {
      hideError(this, newPasswordError);
    }
    if (confirmNewPasswordInput.value && this.value === confirmNewPasswordInput.value) {
      hideError(confirmNewPasswordInput, confirmNewPasswordError);
    }
  });

  confirmNewPasswordInput.addEventListener('input', function() {
    if (this.value && this.value === newPasswordInput.value) {
      hideError(this, confirmNewPasswordError);
    }
  });

  forgotStep2.addEventListener('submit', function(e) {
    e.preventDefault();
    
    let isValid = true;
    
    if (!newPasswordInput.value || newPasswordInput.value.length < 6) {
      showError(newPasswordInput, newPasswordError, '密码长度不能少于6位');
      isValid = false;
    }
    
    if (!confirmNewPasswordInput.value || confirmNewPasswordInput.value !== newPasswordInput.value) {
      showError(confirmNewPasswordInput, confirmNewPasswordError, '两次输入的密码不一致');
      isValid = false;
    }
    
    if (!isValid) return;

    const btnText = step2Btn.querySelector('.btn-text');
    const btnLoading = step2Btn.querySelector('.btn-loading');
    const btnSuccess = step2Btn.querySelector('.btn-success');
    
    btnText.classList.add('opacity-0');
    btnLoading.classList.remove('hidden');
    step2Btn.disabled = true;

    setTimeout(function() {
      btnLoading.classList.add('hidden');
      btnSuccess.classList.remove('hidden');
      step2Btn.classList.remove('bg-primary', 'hover:bg-primary-dark');
      step2Btn.classList.add('bg-accent');

      const step3Circle = document.getElementById('step3Circle');
      const step3Text = document.getElementById('step3Text');
      const line2 = document.getElementById('line2');
      
      step3Circle.classList.remove('bg-border', 'text-muted');
      step3Circle.classList.add('bg-accent', 'text-white');
      step3Text.classList.remove('text-muted');
      step3Text.classList.add('text-accent', 'font-medium');
      line2.classList.remove('bg-border');
      line2.classList.add('bg-accent');

      setTimeout(function() {
        forgotStep2.classList.add('hidden');
        forgotStep3.classList.remove('hidden');
      }, 800);
    }, 1500);
  });
</script>

<div id="footer-container"></div>
<div id="float-actions-container"></div>

<!-- 咨询弹窗 -->
<div id="consultModal" class="fixed inset-0 z-[9999] flex items-center justify-center p-4" style="display:none;">
  <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeConsultModal()"></div>
  <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden">
    <div class="h-2 bg-gradient-to-r from-primary to-accent"></div>
    <div class="p-8">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-2xl font-bold text-body">立即咨询</h3>
        <button onclick="closeConsultModal()" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-100 transition-colors text-muted hover:text-body">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="w-5 h-5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <form id="consultForm" onsubmit="submitConsult(event)" class="space-y-4">
        <div><label class="block text-sm font-medium text-body mb-1.5">姓名 <span class="text-red-400">*</span></label><input type="text" required placeholder="请输入您的姓名" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all text-sm"></div>
        <div><label class="block text-sm font-medium text-body mb-1.5">电话 <span class="text-red-400">*</span></label><input type="tel" required placeholder="请输入您的手机号" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all text-sm"></div>
        <div><label class="block text-sm font-medium text-body mb-1.5">邮箱</label><input type="email" placeholder="请输入您的邮箱" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all text-sm"></div>
        <div><label class="block text-sm font-medium text-body mb-1.5">需求描述</label><textarea rows="3" placeholder="请简要描述您的需求..." class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all text-sm resize-none"></textarea></div>
        <button type="submit" class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3.5 rounded-xl transition-all shadow-sm shadow-primary/20 hover:shadow-md hover:shadow-primary/30">提交咨询</button>
      </form>
    </div>
  </div>
</div>
